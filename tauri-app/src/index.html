<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading LLM Router...</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #060608;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #818cf8;
    }
    body {
      margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.08), transparent 25%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; font-family: 'Inter', sans-serif;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(129, 140, 248, 0.15);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin-bottom: 24px;
      box-shadow: 0 0 16px rgba(129, 140, 248, 0.2);
    }
    .status {
      font-size: 14px; font-weight: 500; letter-spacing: -0.01em; color: var(--text-muted);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="logo.png" alt="LLM Router Logo" style="height: 64px; width: auto; object-fit: contain; margin-bottom: 24px;">
  <div class="spinner"></div>
  <div class="status" id="status">Waking up local backend...</div>
  <script>
    async function checkServer() {
      try {
        const res = await fetch('http://127.0.0.1:3000/api/status');
        if (res.ok) {
          window.location.href = 'http://127.0.0.1:3000';
          return;
        }
      } catch (e) {
        // Not ready yet
      }
      setTimeout(checkServer, 500);
    }
    checkServer();
  </script>
</body>
</html>
