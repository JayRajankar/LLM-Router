<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Router — Free Providers</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');
:root{
  --bg:#08080f;--surface:#0f0f1a;--surface2:#161625;--border:#1d1d2e;
  --accent:#6ee7b7;--accent2:#818cf8;--warn:#fbbf24;--danger:#f87171;--info:#38bdf8;
  --muted:#3a3a58;--text:#e2e8f0;--text-dim:#64748b;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(110,231,183,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(110,231,183,.02) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2rem 1.5rem}

/* Header */
header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
h1{font-size:1.65rem;font-weight:800;letter-spacing:-.03em}
h1 em{color:var(--accent);font-style:normal}
.subtitle{color:var(--text-dim);font-size:.72rem;font-family:var(--mono);margin-top:.15rem}
.live-pill{margin-left:auto;padding:.3rem .9rem;border-radius:999px;font-family:var(--mono);font-size:.65rem;
  background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.2);color:var(--accent);
  display:flex;align-items:center;gap:.45rem;white-space:nowrap;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* Endpoint bar */
.ep-bar{display:flex;align-items:center;gap:.8rem;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:.65rem 1.1rem;margin-bottom:1.5rem;font-family:var(--mono);font-size:.75rem;flex-wrap:wrap}
.method{color:var(--accent);font-weight:700}
.url{color:var(--accent2);word-break:break-all}
.copy-btn{margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
  font-family:var(--mono);font-size:.63rem;padding:.28rem .75rem;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.copy-btn:hover{background:var(--border);color:var(--text)}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1.8rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem}
.stat-label{font-family:var(--mono);font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.stat-val{font-size:1.85rem;font-weight:800;margin-top:.2rem}
.g{color:var(--accent)}.p{color:var(--accent2)}.y{color:var(--warn)}.r{color:var(--danger)}.b{color:var(--info)}

/* Section title */
.sec{font-size:.6rem;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.7rem}

/* Provider grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:.85rem;margin-bottom:1.8rem}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.pcard.active{border-color:rgba(110,231,183,.18)}
.pcard.inactive{opacity:.45}
.pcard-body{padding:1rem 1.1rem .85rem;position:relative}
.pcard.active .pcard-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2))}
.ph{display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem}
.picon{font-size:1.15rem;width:34px;height:34px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-weight:700;font-size:.88rem}
.ppill{margin-left:auto;font-family:var(--mono);font-size:.56rem;padding:.18rem .55rem;border-radius:999px;white-space:nowrap}
.pill-on{background:rgba(110,231,183,.09);color:var(--accent);border:1px solid rgba(110,231,183,.22)}
.pill-off{background:rgba(58,58,88,.2);color:var(--muted);border:1px solid var(--border)}
.pfree{font-family:var(--mono);font-size:.6rem;color:var(--text-dim);margin-bottom:.5rem;line-height:1.5}
.pnote{font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-bottom:.65rem;line-height:1.4;font-style:italic}
.pmetrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem}
.metric{background:var(--surface2);border-radius:7px;padding:.4rem .55rem}
.ml{font-family:var(--mono);font-size:.53rem;color:var(--muted)}
.mv{font-family:var(--mono);font-size:.8rem;font-weight:600;margin-top:.1rem}
/* Slots footer */
.pfoot{border-top:1px solid var(--border);padding:.55rem 1.1rem;background:rgba(0,0,0,.12);
  display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;min-height:36px}
.slot{font-family:var(--mono);font-size:.58rem;padding:.18rem .5rem;border-radius:4px;display:inline-flex;align-items:center;gap:.25rem}
.slot-ok{background:rgba(110,231,183,.07);color:var(--accent);border:1px solid rgba(110,231,183,.18)}
.slot-cool{background:rgba(251,191,36,.07);color:var(--warn);border:1px solid rgba(251,191,36,.18)}
.get-key{font-family:var(--mono);font-size:.58rem;color:var(--accent2);text-decoration:none;margin-left:auto;opacity:.6;transition:opacity .15s}
.get-key:hover{opacity:1}

/* Test panel */
.test-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.8rem}
.panel-hdr{padding:.7rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface2);
  font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:.5rem}
.test-body{padding:1rem;display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:600px){.test-body{grid-template-columns:1fr}}
label{display:block;font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-bottom:.3rem}
textarea,input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:.76rem;padding:.6rem .8rem;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus,input:focus{border-color:var(--accent2)}
textarea{min-height:88px}
.field{margin-bottom:.65rem}
.row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.7rem;align-items:center}
.btn{padding:.55rem 1.2rem;border-radius:8px;font-family:var(--sans);font-weight:700;font-size:.8rem;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#34d399);color:#080810}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.resp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.85rem;
  font-family:var(--mono);font-size:.72rem;line-height:1.65;white-space:pre-wrap;color:var(--text-dim);
  min-height:88px;max-height:260px;overflow-y:auto}
.resp-meta{font-family:var(--mono);font-size:.58rem;color:var(--muted);margin-top:.4rem}
.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(110,231,183,.15);
  border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:.3rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Log */
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.log-hdr{padding:.65rem 1.1rem;border-bottom:1px solid var(--border);background:var(--surface2);
  display:flex;align-items:center}
.log-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.67rem}
.log-table th{text-align:left;padding:.42rem .85rem;color:var(--muted);font-weight:400;font-size:.57rem;
  text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.log-table td{padding:.47rem .85rem;border-bottom:1px solid rgba(29,29,46,.8);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-table tr:last-child td{border-bottom:none}
.log-table tr:hover td{background:var(--surface2)}
.tag{display:inline-block;padding:.08rem .42rem;border-radius:4px;font-size:.56rem}
.tok{background:rgba(110,231,183,.08);color:var(--accent)}
.trl{background:rgba(251,191,36,.08);color:var(--warn)}
.ter{background:rgba(248,113,113,.08);color:var(--danger)}
.tau{background:rgba(56,189,248,.08);color:var(--info)}
.empty{color:var(--muted);font-family:var(--mono);font-size:.7rem;padding:2rem;text-align:center}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>LLM <em>Router</em></h1>
    <div class="subtitle">11 free providers · multi-key pool · round-robin · auto-fallback</div>
  </div>
  <div class="live-pill"><span class="live-dot"></span>LIVE</div>
</header>

<div class="ep-bar">
  <span class="method">POST</span>
  <span class="url" id="ep-url"></span>
  <button class="copy-btn" onclick="copyEp()">Copy</button>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-label">Pool Slots</div><div class="stat-val b" id="s-slots">—</div></div>
  <div class="stat"><div class="stat-label">Active</div><div class="stat-val g" id="s-active">—</div></div>
  <div class="stat"><div class="stat-label">Requests</div><div class="stat-val p" id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">Success</div><div class="stat-val g" id="s-ok">—</div></div>
  <div class="stat"><div class="stat-label">Rate Ltd</div><div class="stat-val y" id="s-rl">—</div></div>
  <div class="stat"><div class="stat-label">Errors</div><div class="stat-val r" id="s-err">—</div></div>
</div>

<div class="sec">Providers — free tier only</div>
<div class="pgrid" id="pgrid"></div>

<div class="test-panel">
  <div class="panel-hdr">🧪 Test</div>
  <div class="test-body">
    <div>
      <div class="field"><label>PROMPT</label>
        <textarea id="tp">Say hello in three languages.</textarea></div>
      <div class="field"><label>SYSTEM (optional)</label>
        <input id="ts" value="You are a helpful assistant."></div>
      <div class="row">
        <button class="btn btn-primary" id="tbtn" onclick="runTest()">Send</button>
        <button class="btn btn-ghost" onclick="resetStats()">Reset Stats</button>
        <span style="font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-left:auto">max tokens: <input id="tt" type="number" value="256" style="width:64px;display:inline;padding:.2rem .4rem"></span>
      </div>
    </div>
    <div>
      <label>RESPONSE</label>
      <div class="resp" id="resp">// response will appear here</div>
      <div class="resp-meta" id="resp-meta"></div>
    </div>
  </div>
</div>

<div class="sec">Request Log</div>
<div class="log-wrap">
  <div class="log-hdr">
    <span style="font-family:var(--mono);font-size:.65rem;color:var(--muted)">RECENT</span>
    <span style="margin-left:auto;font-family:var(--mono);font-size:.6rem;color:var(--muted)" id="log-count"></span>
  </div>
  <table class="log-table">
    <thead><tr><th>Time</th><th>Provider</th><th>Key #</th><th>Model</th><th>Status</th><th>Tokens in+out</th><th>Tries</th></tr></thead>
    <tbody id="log-body"></tbody>
  </table>
</div>

</div>
<script>
const BASE = window.location.origin;
document.getElementById('ep-url').textContent = `${BASE}/v1/chat/completions`;

function copyEp(){
  navigator.clipboard.writeText(document.getElementById('ep-url').textContent);
  const b=document.querySelector('.copy-btn'); b.textContent='Copied!';
  setTimeout(()=>b.textContent='Copy',1500);
}

function stTag(s){
  const m={success:'tok',rate_limited:'trl',error:'ter',auth_error:'tau'};
  return `<span class="tag ${m[s]||'ter'}">${s.replace(/_/g,' ')}</span>`;
}

async function load(){
  try{
    const d = await fetch(`${BASE}/api/status`).then(r=>r.json());
    document.getElementById('s-slots').textContent = d.totalSlots;
    document.getElementById('s-active').textContent = d.activeSlots;
    let ok=0,rl=0,er=0;
    for(const p of Object.values(d.providers)){ok+=p.aggregateStats.success;rl+=p.aggregateStats.rateLimited;er+=p.aggregateStats.failure;}
    document.getElementById('s-total').textContent = ok+rl+er;
    document.getElementById('s-ok').textContent = ok;
    document.getElementById('s-rl').textContent = rl;
    document.getElementById('s-err').textContent = er;

    // Provider cards
    document.getElementById('pgrid').innerHTML = Object.values(d.providers).map(p=>{
      const on = p.keyCount > 0;
      const slots = on
        ? p.slots.map(s=>`<span class="slot ${s.coolingDown?'slot-cool':'slot-ok'}">${s.coolingDown?'❄':'✓'} #${s.keyIndex}${s.coolingDown?' '+s.cooldownSecsLeft+'s':' '+s.stats.success}</span>`).join('')
        : `<span style="font-family:var(--mono);font-size:.58rem;color:var(--muted)">no keys — add to .env</span>`;
      return `<div class="pcard ${on?'active':'inactive'}">
        <div class="pcard-body">
          <div class="ph">
            <div class="picon">${p.icon}</div>
            <div class="pname">${p.name}</div>
            <span class="ppill ${on?'pill-on':'pill-off'}">${on?p.keyCount+' key'+(p.keyCount>1?'s':''):'NO KEYS'}</span>
          </div>
          <div class="pfree">${p.freeInfo}</div>
          ${p.note?`<div class="pnote">${p.note}</div>`:''}
          <div class="pmetrics">
            <div class="metric"><div class="ml">Success</div><div class="mv g">${p.aggregateStats.success}</div></div>
            <div class="metric"><div class="ml">Rate Ltd</div><div class="mv y">${p.aggregateStats.rateLimited}</div></div>
            <div class="metric"><div class="ml">Errors</div><div class="mv r">${p.aggregateStats.failure}</div></div>
          </div>
        </div>
        <div class="pfoot">${slots}<a class="get-key" href="${p.signupUrl}" target="_blank">Get key →</a></div>
      </div>`;
    }).join('');

    // Log
    const logs = d.requestLog||[];
    document.getElementById('log-count').textContent = `${logs.length} entries`;
    const tb = document.getElementById('log-body');
    if(!logs.length){
      tb.innerHTML='<tr><td colspan="7" class="empty">No requests yet.</td></tr>';
    } else {
      tb.innerHTML = logs.map(l=>`<tr>
        <td style="color:var(--muted)">${new Date(l.ts).toLocaleTimeString()}</td>
        <td>${l.providerName||l.providerId||'—'}</td>
        <td style="color:var(--text-dim)">#${l.keyIndex||'?'}</td>
        <td style="color:var(--text-dim)">${(l.model||'—').replace('accounts/fireworks/models/','')}</td>
        <td>${stTag(l.status)}</td>
        <td style="color:var(--muted)">${l.prompt_tokens!=null?l.prompt_tokens+' + '+l.completion_tokens:'—'}</td>
        <td style="color:var(--muted)">${l.attempts||1}</td>
      </tr>`).join('');
    }
  }catch(e){console.error(e);}
}

async function runTest(){
  const prompt=document.getElementById('tp').value.trim();
  const system=document.getElementById('ts').value.trim();
  const maxTok=parseInt(document.getElementById('tt').value)||256;
  const box=document.getElementById('resp');
  const meta=document.getElementById('resp-meta');
  const btn=document.getElementById('tbtn');
  if(!prompt) return;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Sending…';
  box.textContent='// waiting…'; meta.textContent='';
  const msgs=[];
  if(system) msgs.push({role:'system',content:system});
  msgs.push({role:'user',content:prompt});
  const t0=Date.now();
  try{
    const res=await fetch(`${BASE}/v1/chat/completions`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,max_tokens:maxTok})
    });
    const data=await res.json();
    const el=((Date.now()-t0)/1000).toFixed(2);
    if(data.error){ box.textContent=`ERROR: ${data.error.message||JSON.stringify(data.error)}`; }
    else{
      box.textContent=data.choices?.[0]?.message?.content||JSON.stringify(data,null,2);
      meta.textContent=`slot: ${data._router?.slot||'?'} · attempts: ${data._router?.attempts||1} · ${el}s · tokens: ${data.usage?.prompt_tokens??'?'} + ${data.usage?.completion_tokens??'?'}`;
    }
  }catch(e){box.textContent=`Network error: ${e.message}`;}
  btn.disabled=false; btn.textContent='Send';
  load();
}

async function resetStats(){
  await fetch(`${BASE}/api/reset-stats`,{method:'POST'});
  load();
}

load();
setInterval(load,5000);
</script>
</body>
</html>
